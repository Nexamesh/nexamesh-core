name: Infra — Terragrunt

# plan  → on every PR that touches terraform files
# apply → on push to dev (auto) or workflow_dispatch (manual, any env)

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "infra/terraform/_modules/**"
      - "infra/terraform/live/**"
      - "infra/terraform/terragrunt.hcl"
      - ".github/workflows/infra-terragrunt.yml"
  push:
    branches: [dev]
    paths:
      - "infra/terraform/_modules/**"
      - "infra/terraform/live/dev/**"
      - "infra/terraform/terragrunt.hcl"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [dev, prd]
        default: dev
        required: true
      action:
        description: "Action to perform"
        type: choice
        options: [plan, apply]
        default: plan
        required: true

# OIDC token for Azure login + write access to post PR comments
permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_VERSION: "1.9.8"
  TG_VERSION: "0.68.9"
  # azurerm provider OIDC — no long-lived credentials in the runner
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"
  # Passed to Terraform as variables — all sourced from GitHub Secrets
  TF_VAR_entra_id_tenant_id: ${{ secrets.AZURE_ENTRA_TENANT_ID }}
  TF_VAR_entra_id_client_id: ${{ secrets.AZURE_ENTRA_CLIENT_ID }}
  TF_VAR_azure_openai_api_key: ${{ secrets.AZURE_OPENAI_API_KEY }}
  TF_VAR_azure_openai_endpoint: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

# ─────────────────────────────────────────────────────────────────────────────
# Plan — pull_request or manual dispatch with action=plan
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  plan:
    name: Plan (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan')

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Install Terragrunt ${{ env.TG_VERSION }}
        run: |
          curl -sL \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64" \
            -o terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/
          terragrunt --version

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bootstrap tfstate backend (idempotent)
        run: bash infra/terraform/scripts/bootstrap-tfstate.sh "$ENVIRONMENT"

      - name: Cache Terraform providers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: tf-providers-${{ env.ENVIRONMENT }}-${{ hashFiles('infra/terraform/_modules/**/*.tf', 'infra/terraform/root.terragrunt.hcl') }}
          restore-keys: tf-providers-${{ env.ENVIRONMENT }}-

      - name: Terragrunt init
        working-directory: infra/terraform/live/${{ env.ENVIRONMENT }}/nexamesh-core
        run: terragrunt init -reconfigure

      - name: Terragrunt plan
        id: plan
        working-directory: infra/terraform/live/${{ env.ENVIRONMENT }}/nexamesh-core
        run: |
          set +e
          terragrunt plan -out=tfplan -no-color 2>&1 | tee plan_raw.txt
          PLAN_EXIT=${PIPESTATUS[0]}
          set -e

          # Trim to last 200 lines to avoid comment size limits
          PLAN_TEXT=$(tail -200 plan_raw.txt)

          # Write to file so github-script can read it safely (avoids shell injection)
          echo "$PLAN_TEXT" > /tmp/plan_summary.txt
          echo "exit_code=$PLAN_EXIT" >> $GITHUB_OUTPUT
          exit $PLAN_EXIT

      - name: Post plan comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          PLAN_FILE: /tmp/plan_summary.txt
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
          PLAN_EXIT: ${{ steps.plan.outputs.exit_code }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const fs      = require('fs');
            const planText = fs.readFileSync(process.env.PLAN_FILE, 'utf8');
            const env      = process.env.ENVIRONMENT;
            const exitCode = process.env.PLAN_EXIT;
            const runUrl   = process.env.RUN_URL;
            const icon     = exitCode === '0' ? '✅' : '❌';

            const body = [
              `### ${icon} Terragrunt plan — \`${env}\``,
              '',
              '<details><summary>Show plan output</summary>',
              '',
              '```',
              planText,
              '```',
              '</details>',
              '',
              `[View run](${runUrl})`,
            ].join('\n');

            const marker = `<!-- tg-plan-${env} -->`;
            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body:       `${marker}\n${body}`,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body:         `${marker}\n${body}`,
              });
            }

      - name: Plan step summary
        if: always()
        run: |
          {
            echo "## Terragrunt plan — \`${ENVIRONMENT}\`"
            echo ""
            echo '```'
            tail -30 infra/terraform/live/${ENVIRONMENT}/nexamesh-core/plan_raw.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

# ─────────────────────────────────────────────────────────────────────────────
# Apply — push to dev (auto) or manual dispatch with action=apply
# ─────────────────────────────────────────────────────────────────────────────
  apply:
    name: Apply (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    # Uncomment to add required-reviewer gates (also add matching federated
    # credential subject repo:Nexamesh/nexamesh-core:environment:<env>):
    # environment: ${{ github.event.inputs.environment || 'dev' }}

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Install Terragrunt ${{ env.TG_VERSION }}
        run: |
          curl -sL \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64" \
            -o terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bootstrap tfstate backend (idempotent)
        run: bash infra/terraform/scripts/bootstrap-tfstate.sh "$ENVIRONMENT"

      - name: Cache Terraform providers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: tf-providers-${{ env.ENVIRONMENT }}-${{ hashFiles('infra/terraform/_modules/**/*.tf', 'infra/terraform/root.terragrunt.hcl') }}
          restore-keys: tf-providers-${{ env.ENVIRONMENT }}-

      - name: Terragrunt init
        working-directory: infra/terraform/live/${{ env.ENVIRONMENT }}/nexamesh-core
        run: terragrunt init -reconfigure

      - name: Terragrunt apply
        working-directory: infra/terraform/live/${{ env.ENVIRONMENT }}/nexamesh-core
        run: terragrunt apply -auto-approve -no-color

      - name: Collect outputs
        id: tf-outputs
        working-directory: infra/terraform/live/${{ env.ENVIRONMENT }}/nexamesh-core
        run: |
          DOCS_URL=$(terragrunt output -raw static_web_app_docs_url 2>/dev/null || echo "n/a")
          MKT_URL=$(terragrunt output -raw static_web_app_marketing_url 2>/dev/null || echo "n/a")
          FUNC_URL=$(terragrunt output -raw functions_url 2>/dev/null || echo "n/a")
          KV_URI=$(terragrunt output -raw key_vault_uri 2>/dev/null || echo "n/a")
          echo "docs_url=$DOCS_URL"       >> $GITHUB_OUTPUT
          echo "marketing_url=$MKT_URL"  >> $GITHUB_OUTPUT
          echo "functions_url=$FUNC_URL" >> $GITHUB_OUTPUT
          echo "key_vault_uri=$KV_URI"   >> $GITHUB_OUTPUT

          # SWA deployment tokens — captured separately, never logged
          terragrunt output -raw static_web_app_docs_api_key      2>/dev/null > /tmp/swa_docs_token.txt      || true
          terragrunt output -raw static_web_app_marketing_api_key 2>/dev/null > /tmp/swa_marketing_token.txt || true

      - name: Sync SWA deployment tokens to Key Vault
        # GITHUB_TOKEN cannot write repo secrets; store tokens in Azure Key Vault
        # instead. Deployment workflows retrieve them via OIDC + az keyvault secret show.
        working-directory: infra/terraform/live/${{ env.ENVIRONMENT }}/nexamesh-core
        run: |
          KV_NAME=$(terragrunt output -raw key_vault_uri 2>/dev/null | sed 's|https://||;s|\.vault\.azure\.net/||' || echo "")
          if [ -z "$KV_NAME" ]; then
            echo "Key Vault name not available, skipping token sync"
            exit 0
          fi

          sync_kv_secret() {
            local secret_name="$1" token_file="$2"
            if [ -s "$token_file" ]; then
              az keyvault secret set \
                --vault-name "$KV_NAME" \
                --name "$secret_name" \
                --file "$token_file" \
                --output none
              echo "Synced $secret_name to $KV_NAME"
            fi
          }

          sync_kv_secret "SwaTokenDocs"      /tmp/swa_docs_token.txt
          sync_kv_secret "SwaTokenMarketing" /tmp/swa_marketing_token.txt

      - name: Apply step summary
        env:
          DOCS_URL: ${{ steps.tf-outputs.outputs.docs_url }}
          MARKETING_URL: ${{ steps.tf-outputs.outputs.marketing_url }}
          FUNCTIONS_URL: ${{ steps.tf-outputs.outputs.functions_url }}
          KEY_VAULT_URI: ${{ steps.tf-outputs.outputs.key_vault_uri }}
        run: |
          {
            echo "## ✅ Terragrunt apply — \`${ENVIRONMENT}\`"
            echo ""
            echo "| Resource | URL |"
            echo "|----------|-----|"
            echo "| Docs SWA | ${DOCS_URL} |"
            echo "| Marketing SWA | ${MARKETING_URL} |"
            echo "| Functions | ${FUNCTIONS_URL} |"
            echo "| Key Vault | ${KEY_VAULT_URI} |"
          } >> "$GITHUB_STEP_SUMMARY"
