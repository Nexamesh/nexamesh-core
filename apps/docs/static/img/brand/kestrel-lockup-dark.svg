<svg viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kestrel Mesh">
  <!-- Kestrel Mesh — product lockup, dark variant -->
  <!-- Icon mark only. For full bird illustration use kestrel-handoff.png -->

  <rect width="300" height="100" fill="#182231" rx="10"/>

  <!-- Triangle icon, scaled to fit -->
  <g transform="translate(18,18) scale(0.64)">
    <path
      d="M50 14 L84 74 L16 74 Z"
      stroke="#C77A1B"
      stroke-width="3.5"
      stroke-linejoin="round"
      stroke-linecap="round"
      fill="none"
    />
    <circle cx="50" cy="14" r="5.5" fill="#C77A1B"/>
    <circle cx="84" cy="74" r="5.5" fill="#C77A1B"/>
    <circle cx="16" cy="74" r="5.5" fill="#C77A1B"/>
  </g>

  <line x1="92" y1="28" x2="92" y2="72" stroke="#2B3440" stroke-width="1.5"/>

  <text
    x="108"
    y="55"
    font-family="Manrope, Inter, system-ui, sans-serif"
    font-weight="500"
    font-size="24"
    letter-spacing="-0.3"
    fill="#F1F0EA"
  >Kestrel</text>
  <text
    x="108"
    y="76"
    font-family="Manrope, Inter, system-ui, sans-serif"
    font-weight="400"
    font-size="14"
    letter-spacing="2.5"
    fill="#C77A1B"
  >MESH</text>
</svg>
