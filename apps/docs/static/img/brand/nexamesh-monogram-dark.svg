<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NexaMesh monogram">
  <!-- NexaMesh N Monogram — dark variant -->
  <!-- Palette: Deep Navy bg, Warm Sand strokes, Signal Amber transmission nodes -->
  <!-- Design: two vertical anchors + one diagonal transmission path + node logic at joins -->

  <rect width="100" height="100" fill="#182231" rx="12"/>

  <!-- N strokes: round caps, sand, medium weight -->
  <g stroke="#F1F0EA" stroke-width="9.5" stroke-linecap="round" fill="none">
    <line x1="22" y1="17" x2="22" y2="83"/>
    <line x1="22" y1="17" x2="78" y2="83"/>
    <line x1="78" y1="17" x2="78" y2="83"/>
  </g>

  <!-- Secondary nodes: non-transmission corners, sand -->
  <circle cx="22" cy="83" r="5" fill="#F1F0EA"/>
  <circle cx="78" cy="17" r="5" fill="#F1F0EA"/>

  <!-- Transmission nodes: diagonal endpoints, amber — the signal path -->
  <circle cx="22" cy="17" r="6.5" fill="#C77A1B"/>
  <circle cx="78" cy="83" r="6.5" fill="#C77A1B"/>
</svg>
