<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sentinel Ring symbol">
  <!-- Sentinel Ring — dashed open arc, 3 perimeter nodes, scanning quality -->
  <!-- Burnt Copper #A95F1D — persistent, perimeter, coverage -->
  <!--
    Arc: centre (50,50), r=38
    Start: 90° CW from top (right)  → (88, 50)
    End:   0° (top)                 → (50, 12)
    Sweep: 270° clockwise (large arc, so flag=1)
    Gap at upper-right (12 o'clock to 3 o'clock)
  -->

  <rect width="100" height="100" fill="#182231" rx="12"/>

  <!-- Outer dashed scanning arc — 270° sweep, gap at upper-right -->
  <path
    d="M88 50 A38 38 0 1 1 50 12"
    stroke="#A95F1D"
    stroke-width="4"
    stroke-linecap="round"
    stroke-dasharray="5 3"
    fill="none"
  />

  <!-- Inner sweep arc — Steel Grey, scanning motion feel -->
  <path
    d="M74 74 A34 34 0 1 1 26 50"
    stroke="#6B7480"
    stroke-width="2"
    stroke-linecap="round"
    stroke-dasharray="3 4"
    fill="none"
  />

  <!-- Three perimeter nodes at 90°, 210°, 330° (compass east, lower-left, lower-right) -->
  <!-- 90° (3 o'clock): (88, 50) -->
  <circle cx="88" cy="50" r="5.5" fill="#A95F1D"/>
  <!-- 210° CW from top: x=50+38*sin(210°)=50-19=31, y=50-38*cos(210°)=50+32.9=83 -->
  <circle cx="31" cy="83" r="5.5" fill="#A95F1D"/>
  <!-- 330° CW from top: x=50+38*sin(330°)=50-19=31... wait let me recalc -->
  <!-- 330° CW from top = 330° clockwise = -30° from top = same as 30° CCW from top -->
  <!-- x=50+38*sin(330°)=50+38*(-0.5)=50-19=31, y=50-38*cos(330°)=50-38*(0.866)=50-32.9=17.1 -->
  <!-- That puts it at upper-left, inside the gap. Let me use even 120° spacing from 90°: 90°, 210°, 330° -->
  <!-- 90°: (88,50) ✓ -->
  <!-- 210°: x=50+38*sin(210°)=50-19=31, y=50-38*cos(210°)=50+32.9=82.9 → (31,83) ✓ -->
  <!-- 330°: x=50+38*sin(330°)=50-19=31, y=50-38*cos(330°)=50-32.9=17.1 — inside gap, use 270° instead -->
  <!-- Let's use 90°, 180°, 270° for clean compass placement -->
  <!-- 180° (6 o'clock bottom): (50, 88) -->
  <circle cx="50" cy="88" r="5.5" fill="#A95F1D"/>
  <!-- 270° (9 o'clock left): (12, 50) -->
  <circle cx="12" cy="50" r="5.5" fill="#A95F1D"/>
</svg>
