<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kestrel Mesh symbol">
  <!-- Kestrel Mesh — simplified icon mark, upward triangle with amber nodes -->
  <!-- Use kestrel-handoff.png for full bird illustration -->
  <!-- Signal Amber #C77A1B — fast, directional, deployable -->

  <rect width="100" height="100" fill="#182231" rx="12"/>

  <path
    d="M50 14 L84 74 L16 74 Z"
    stroke="#C77A1B"
    stroke-width="3.5"
    stroke-linejoin="round"
    stroke-linecap="round"
    fill="none"
  />

  <circle cx="50" cy="14" r="5.5" fill="#C77A1B"/>
  <circle cx="84" cy="74" r="5.5" fill="#C77A1B"/>
  <circle cx="16" cy="74" r="5.5" fill="#C77A1B"/>
</svg>
