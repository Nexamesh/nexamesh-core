<svg viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sentinel Ring">
  <!-- Sentinel Ring — product lockup, dark variant -->

  <rect width="300" height="100" fill="#182231" rx="10"/>

  <!-- Sentinel symbol (scaled 64×64) — dashed arc, Stitch geometry -->
  <g transform="translate(18,18) scale(0.64)">
    <path
      d="M88 50 A38 38 0 1 1 50 12"
      stroke="#A95F1D"
      stroke-width="4"
      stroke-linecap="round"
      stroke-dasharray="5 3"
